<div class="main-container">
  <mat-card id ="main-contact-container">
    <header id ="main-contact-container-header">
      <section>
        <h1><strong>{{ 'contact.title' | transloco }}</strong></h1>
      </section>
      <section>
        <p>
          {{ 'contact.legend' | transloco }}
        </p>
      </section>
    </header>
    <main id="contact-card-grid">
      <mat-card (click)="this.router.goToRoute('7224581912','whatsapp')" class="contact-item">
        <aside class="contact-item-img">
          <img [ngSrc]="whatsappImageSrc" alt="whatsapp"
               height="80" priority="true" width="80"
          />
        </aside>
        <main>
          <h1>WhatsApp</h1>
        </main>
      </mat-card>
      <mat-card (click)="this.router.goToRoute('edgaralex471@gmail.com', 'email')" class="contact-item">
        <aside class="contact-item-img">
          <img [ngSrc]="emailImageSrc" alt="email"
               height="80" priority="true" width="80"
          />
        </aside>
        <main>
          <h1>email</h1>
        </main>
      </mat-card>
      <mat-card (click)="this.router.goToRoute('https://www.linkedin.com/in/alextcw/')" class="contact-item">
        <aside class="contact-item-img">
          <img [ngSrc]="linkedinImageSrc" alt="linkedin"
               height="80" priority="true" width="80"
          />
        </aside>
        <main>
          <h1>LinkedIn</h1>
        </main>
      </mat-card>
      <mat-card (click)="this.router.goToRoute('https://github.com/AlexTcw')" class="contact-item">
        <aside class="contact-item-img">
          <img [ngSrc]="githubImageSrc" alt="github"
               height="80" priority="true" width="80"
          />
        </aside>
        <main>
          <h1>GitHub</h1>
        </main>
      </mat-card>
    </main>
  </mat-card>
</div>
