<div class="main-container">
  <header class="resume-header">
    <button matFab extended="true" (click)="openFile('cv_en.pdf')">
      <mat-icon>download</mat-icon> {{'resume.button-en' | transloco}}
    </button>
    <button matFab extended="true" (click)="openFile('cv_es.pdf')">
      <mat-icon>download</mat-icon> {{'resume.button-es' | transloco}}
    </button>
  </header>
  <main class="table-container">
    <table
      mat-table
      [dataSource]="tableData()"
      multiTemplateDataRows = "true"
      class="mat-shadow-2">

      @for (column of columnsToDisplay; track column) {
        <ng-container [matColumnDef]="column">
          <td mat-cell *matCellDef="let element">
            {{ this.translateService.getTranslateText(element[column])}}
          </td>
        </ng-container>
      }

      <ng-container matColumnDef="expand">
        <td mat-cell *matCellDef="let element">
          <button
            mat-icon-button
            (click)="toggle(element); $event.stopPropagation()"
            [class.table-toggle-button-expanded]="isExpanded(element)">
            <mat-icon>keyboard_arrow_down</mat-icon>
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="expandedDetail">
        <td
          mat-cell
          *matCellDef="let element"
          [attr.colspan]="columnsToDisplayWithExpand.length">

          <div
            class="table-element-detail-wrapper"
            [class.table-element-detail-wrapper-expanded]="isExpanded(element)">

            <div class="table-element-detail">
              @for (detail of element.details; track $index) {
                  <app-resume-card [data]="detail"></app-resume-card>
              }
            </div>

          </div>
        </td>
      </ng-container>

      <tr mat-row *matRowDef="let element; columns: columnsToDisplayWithExpand"
          class="table-element-row" [class.table-expanded-row] = "isExpanded(element)"
          (click)="toggle(element)">
      </tr>

      <tr
        mat-row
        *matRowDef="let row; columns: ['expandedDetail']"
        class="table-detail-row"
      >
      </tr>

    </table>
  </main>
</div>
